<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Persona Composer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>persona&nbsp;composer</h1>
        <p class="sub">compose a post in a persona's voice · phase 1</p>
      </header>

      <section class="controls">
        <div class="row">
          <label for="persona">Persona</label>
          <select id="persona" aria-label="Persona"></select>
        </div>
        <div class="row">
          <label for="platform">Platform</label>
          <select id="platform" aria-label="Platform">
            <option value="x">X (280)</option>
            <option value="instagram">Instagram (2200)</option>
          </select>
        </div>
      </section>

      <p id="persona-desc" class="persona-desc"></p>

      <label class="field-label" for="source">Source post <span class="muted">(optional — leave blank to compose a standalone post)</span></label>
      <textarea id="source" rows="4" placeholder="Paste the post you want to reply to…"></textarea>

      <label class="field-label" for="extra">Extra direction <span class="muted">(optional)</span></label>
      <input id="extra" type="text" placeholder="e.g. mention the deadline, keep it upbeat…" />

      <div class="actions">
        <button id="compose" class="primary">Compose</button>
        <span id="status" class="status"></span>
      </div>

      <label class="field-label" for="result">Draft <span class="muted">(editable)</span></label>
      <textarea id="result" rows="6" placeholder="The draft will stream in here…"></textarea>

      <div class="result-footer">
        <span id="charcount" class="charcount"></span>
        <button id="copy" class="ghost" disabled>Copy</button>
      </div>

      <footer>
        <span>phase 1 · no platform APIs · nothing is posted for you</span>
      </footer>
    </main>
    <script src="app.js"></script>
  </body>
</html>
